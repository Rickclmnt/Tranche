<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>TRANCHE VERICON_</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header class="header">
    <div class="brand">
      <div class="title">TRANCHE VERICON_</div>
      <div class="subtitle">Verified • Curated • Personal</div>
    </div>

    <div class="profile-icon" id="profileBtn" title="Profile">☰</div>
  </header>

  <div id="categories" class="categories" aria-hidden="false">
    <div id="searchOverlay" class="search-overlay">
      <div class="search-box">
        <input id="globalSearchInput" placeholder="Search news…" />
        <button id="closeSearch" class="close-search">✕</button>
      </div>
      <div id="searchResults"></div>
    </div>
  </div>

  <div id="billboard" aria-hidden="false"></div>

  <main class="container" id="content"></main>

  <section id="chart-section"><canvas id="trajectoryChart" height="120"></canvas></section>

  <!-- libs -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- app -->
  <script src="app.js"></script>
</body>
</html>
