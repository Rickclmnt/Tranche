<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Profile — TRANCHE VERICON_</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header class="header">
    <div class="brand">
      <div class="title">TRANCHE VERICON_</div>
      <div class="subtitle">Curated • Verified • Personal</div>
    </div>

    <div class="profile-icon" onclick="location.href='index.html'">←</div>
  </header>

  <main class="page">
    <section class="profile-card">
      <div class="pfp" id="pfp" style="background-image:url('data/avatar_default.png');background-size:cover"></div>
      <div>
        <h2 id="profileName">Your name</h2>
        <p id="profileBio">Short bio or tagline.</p>
        <div style="margin-top:12px">
          <button id="editProfileBtn">Edit profile (demo)</button>
        </div>
      </div>
    </section>

    <div style="margin-top:18px">
      <label for="profile-search">Search My News</label>
      <input id="profile-search" placeholder="Search followed stories..." style="width:100%;padding:8px;border:1px solid #ddd;margin-top:8px"/>
    </div>

    <h3 style="margin-top:18px">Inbox</h3>
    <div id="inbox"></div>

    <h3 style="margin-top:18px">My News</h3>
    <div id="mynews"></div>
  </main>

  <script src="profile.js"></script>
</body>
</html>
